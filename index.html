<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linker 考勤與請假規則小幫手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <h1>考勤與請假小幫手</h1>
            <p>輕鬆計算假單時數與應打卡時間</p>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-btn active" data-target="normal">一般上班試算</button>
                <button class="tab-btn" data-target="leave">一般請假</button>
                <button class="tab-btn" data-target="remote">遠端會議 (不扣薪假)</button>
            </div>

            <div class="card">
                <!-- Mode Normal -->
                <div id="section-normal" class="input-section active">
                    <p class="section-desc">試算在不請假的情況下，何時應該下班打卡。</p>
                    <div class="input-group">
                        <label>實際/預計上班打卡時間</label>
                        <input type="time" id="clockIn-normal" class="time-input" required>
                    </div>
                </div>

                <!-- Mode Leave -->
                <div id="section-leave" class="input-section">
                    <p class="section-desc">輸入您的請假時段，我們會自動扣除午休並計算打卡時間。</p>
                    <div class="row">
                        <div class="input-group">
                            <label>請假開始時間</label>
                            <input type="time" id="leaveStart" class="time-input" value="09:30">
                        </div>
                        <div class="input-group">
                            <label>請假結束時間</label>
                            <input type="time" id="leaveEnd" class="time-input" value="18:30">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>進辦公室打卡時間 <span class="badge">選填</span></label>
                        <input type="time" id="clockIn-leave" class="time-input">
                    </div>
                </div>

                <!-- Mode Remote -->
                <div id="section-remote" class="input-section">
                    <p class="section-desc">開會多久請多久，系統會自動給予彈性並計算您最晚進公司的時間。</p>
                    <div class="input-group">
                        <label>遠端會議時數</label>
                        <select id="remoteHours" class="select-input">
                            <option value="0.5">0.5 小時 (30分鐘)</option>
                            <option value="1.0" selected>1.0 小時</option>
                            <option value="1.5">1.5 小時</option>
                            <option value="2.0">2.0 小時</option>
                            <option value="2.5">2.5 小時</option>
                            <option value="3.0">3.0 小時</option>
                            <option value="3.5">3.5 小時</option>
                            <option value="4.0">4.0 小時</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>進辦公室打卡時間 <span class="badge">選填</span></label>
                        <input type="time" id="clockIn-remote" class="time-input">
                    </div>
                </div>

                <button id="calcBtn" class="primary-btn">立即計算</button>
            </div>

            <div id="resultCard" class="card result-card hidden">
                <h2>計算結果</h2>
                <div id="resultContent" class="result-content"></div>
            </div>
        </main>

        <footer>
            <p>📢 遵守公司考勤規範，保障您的權益</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
